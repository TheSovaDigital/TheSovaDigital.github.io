<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0f" />

  <title>Хижина красоты — салон красоты в Новосаратовке</title>
  <meta name="description" content="Хижина красоты — салон красоты в Новосаратовке. Стрижка волос и окрашивание волос в Новосаратовке. Запись в Telegram или Dikidi." />
  <meta name="keywords" content="Салон красоты в Новосаратовке, Парикмахерская в Новосаратовке, Стрижка волос в Новосаратовке, Окрашивание волос в Новосаратовке" />
  <link rel="canonical" href="https://hizhina.com/" />

  <link rel="manifest" href="site.webmanifest" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />

  <link rel="preload" as="image" href="logo_hizhina.webp" />
  <link rel="preload" as="image" href="hizh.png" />

  <style>
    :root{
      --bg:#0b0b0f;
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.72);
      --max:1100px;
      --goldA:rgba(246,230,182,.92);
      --goldB:rgba(202,164,90,.62);
      --goldC:rgba(138,106,47,.75);
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      overflow-x:hidden;
    }

    .bg{
      position:fixed;
      inset:0;
      z-index:-1;
      pointer-events:none;
      background:
        radial-gradient(1200px 700px at 25% 20%, rgba(171,120,44,.22), transparent 60%),
        radial-gradient(900px 600px at 78% 28%, rgba(28,79,132,.18), transparent 62%),
        radial-gradient(900px 650px at 55% 85%, rgba(0,0,0,.55), transparent 60%),
        linear-gradient(#07070b, #050509);
    }

    .container{
      width:min(var(--max), 100% - 32px);
      margin:0 auto;
    }

    header{
      background:linear-gradient(to bottom, rgba(6,6,9,.55), rgba(6,6,9,.18), transparent);
      backdrop-filter:saturate(1.05) blur(6px);
    }

    .header-inner{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:10px 0;
    }

    .brand img{
      height:74px;
      filter: drop-shadow(0 0 14px rgba(255,210,120,.40));
    }

    .social{
      display:flex;
      gap:10px;
    }

    .icon-btn{
      width:42px;height:42px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.12);
    }

    .icon-btn svg{
      width:19px;height:19px;
      fill:rgba(255,255,255,.86);
    }

    /* HERO */
    .hero{
      min-height:calc(100vh - 94px);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:16px 0 10px;
      gap:18px;
      text-align:center;
    }

    .hut{
      width:min(1180px, 96vw);
      height:min(70vh, 740px);
      object-fit:contain;
      animation: float 6.5s ease-in-out infinite;
    }

    @keyframes float{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-10px)}
    }

    .cta{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
    }

    .btn{
      border:1px solid rgba(214,178,106,.55);
      background:rgba(0,0,0,.18);
      color:#fff;
      font-weight:750;
      padding:14px 26px;
      border-radius:999px;
      min-width:280px;
      cursor:pointer;
    }

    .menu{
      display:none;
      flex-direction:column;
      gap:10px;
      width:min(420px, 92vw);
    }

    .menu.show{
      display:flex;
    }

    .menu a{
      text-decoration:none;
      color:#fff;
      padding:12px 16px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.03);
    }

    /* MOBILE FIX — встроен */
    @media (max-width: 720px){

      .hero{
        min-height: calc(100dvh - 94px);
        padding-bottom: 48px; /* запас над нижней панелью iPhone Chrome */
      }

      .hut{
        height:42vh;
        max-height:340px;
      }

      .btn{
        min-width:240px;
      }
    }
  </style>
</head>

<body>
  <div class="bg"></div>

  <header>
    <div class="container header-inner">
      <div class="brand">
        <img src="logo_hizhina.webp" alt="Хижина красоты" />
      </div>
      <nav class="social">
        <a class="icon-btn" href="https://instagram.com/thehizhina" target="_blank"></a>
        <a class="icon-btn" href="https://t.me/TheHizhina" target="_blank"></a>
        <a class="icon-btn" href="https://vk.com/thehizhina" target="_blank"></a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero container">
      <img class="hut" src="hizh.png" alt="Хижина" />

      <div class="cta">
        <button class="btn" id="ctaBtn" aria-expanded="false">
          Записаться ▾
        </button>

        <div id="menu" class="menu">
          <a href="https://t.me/ImAnitka" target="_blank">Telegram</a>
          <a href="https://dikidi.ru/1913894" target="_blank">Dikidi</a>
          <a href="tel:+79111115528">Позвонить</a>
        </div>
      </div>
    </section>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const btn = document.getElementById("ctaBtn");
      const menu = document.getElementById("menu");

      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const isOpen = menu.classList.toggle("show");
        btn.setAttribute("aria-expanded", isOpen);
      });

      document.addEventListener("click", (e) => {
        if (!menu.contains(e.target) && e.target !== btn) {
          menu.classList.remove("show");
          btn.setAttribute("aria-expanded", "false");
        }
      });
    });
  </script>

</body>
</html>
